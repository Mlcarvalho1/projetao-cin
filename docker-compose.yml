services:
  postgres:
    image: postgres:16-alpine
    container_name: aquasense-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aquasense
      POSTGRES_PASSWORD: aquasense
      POSTGRES_DB: aquasense
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aquasense -d aquasense"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
