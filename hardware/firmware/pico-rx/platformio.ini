; AquaSense — receptor da fazenda (RX). Device principal do MVP.
; MVP: sensores conectados direto no Pico 2 W via ADC; RX faz frame_pack e
;      POSTa em /readings via HTTPS.
; Etapa 6 (LoRa): RX volta a ser só receptor; pico-tx envia frames via SX1276.
[platformio]
default_envs = pico-rx

[env:pico-rx]
platform = raspberrypi
board = rpipico2w
framework = picosdk

monitor_speed = 115200
upload_protocol = picotool

build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -DAQUASENSE_DEVICE_ROLE=\"rx\"
    ; MVP: TLS sem validação de cert. Trocar pra AQUASENSE_TLS_VERIFY=1 antes de produção.
    -DAQUASENSE_TLS_VERIFY=0
    ; printf vai pro USB-CDC (não pro UART). Conecta pelo mesmo cabo do upload.
    -DPICO_STDIO_USB=1
    -DPICO_STDIO_UART=0

lib_extra_dirs = ${PROJECT_DIR}/..
lib_deps =
    aquasense_proto
