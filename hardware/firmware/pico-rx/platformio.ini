; AquaSense — receptor da fazenda (RX).
; Pico W: recebe frames (UDP no MVP, LoRa depois) e POSTa em /readings via HTTPS.
[platformio]
default_envs = pico-rx

[env:pico-rx]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipicow
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m

monitor_speed = 115200
upload_protocol = picotool

build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -DAQUASENSE_DEVICE_ROLE=\"rx\"
    ; MVP: TLS sem validação de cert. Trocar para AQUASENSE_TLS_VERIFY=1 antes de produção.
    -DAQUASENSE_TLS_VERIFY=0

lib_extra_dirs = ${PROJECT_DIR}/..
lib_deps =
    aquasense_proto
    bblanchon/ArduinoJson@^7.1.0
