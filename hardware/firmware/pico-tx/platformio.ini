; AquaSense — nó de campo (TX). Placeholder: só entra em jogo na Etapa 6 (link LoRa).
; MVP roda 100% no pico-rx com sensores conectados direto. Este projeto fica buildando
; um esqueleto pra garantir que a lib aquasense_proto continua linkando no Pico (sem WiFi).
[platformio]
default_envs = pico-tx

[env:pico-tx]
platform = raspberrypi
board = rpipico
framework = picosdk

monitor_speed = 115200
upload_protocol = picotool

build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -DAQUASENSE_DEVICE_ROLE=\"tx\"
    -DPICO_STDIO_USB=1
    -DPICO_STDIO_UART=0

lib_extra_dirs = ${PROJECT_DIR}/..
lib_deps =
    aquasense_proto
