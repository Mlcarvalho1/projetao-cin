; AquaSense — nó de campo (TX).
; MVP: Pico W (rpipicow) usando WiFi/UDP em vez de LoRa.
; Quando migrarmos pra LoRa: trocar board para "pico" e env name para "pico-tx-lora".
[platformio]
default_envs = pico-tx-wifi

[env:pico-tx-wifi]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipicow
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0.5m

monitor_speed = 115200
upload_protocol = picotool

build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -DAQUASENSE_DEVICE_ROLE=\"tx\"

lib_extra_dirs = ${PROJECT_DIR}/..
lib_deps =
    aquasense_proto
